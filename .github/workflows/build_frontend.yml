name: Build Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/api/**"
      - "frontend/app/**"
      - "frontend/components/**"
      - "frontend/contexts/**"
      - "frontend/pages/**"
      - "frontend/services/**"
      - "frontend/styles/**"
      - "frontend/public/**"
      - "frontend/types/**"
      - "frontend/.env"
      - "frontend/*.config.ts"
      - "frontend/tsconfig.json"
      - "frontend/package.json"
      - "frontend/pnpm-lock"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and Push Frontend Container
        run: |
          make build_frontend
          docker push ghcr.io/FindFirst-Development/findfirst-frontend:latest
